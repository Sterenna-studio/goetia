name: Deploy GOETIA → nitro.sterenna.fr/goetia

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-goetia
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Install deps
        run: npm ci

      - name: Build
        run: npm run build

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.OVH_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.OVH_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Ensure remote dir
        run: |
          ssh -i ~/.ssh/deploy_key "${{ secrets.OVH_USER }}@${{ secrets.OVH_HOST }}" \
            "mkdir -p ~/nitro/goetia"

      - name: Deploy via rsync
        run: |
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=yes" \
            dist/ \
            "${{ secrets.OVH_USER }}@${{ secrets.OVH_HOST }}:~/nitro/goetia/"

      - name: Cleanup
        if: always()
        run: rm -f ~/.ssh/deploy_key
